services:
  - type: web
    name: credovation-api
    runtime: node
    region: oregon
    rootDir: server
    buildCommand: npm install && npx prisma generate --schema=src/prisma/schema.prisma && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false
